<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Pose Tracking</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      color: #fff;
      font-family: 'Poppins', Arial, sans-serif;
    }
    .container {
      width: min(100%, 1080px);
      padding: 16px;
      box-sizing: border-box;
    }
    .title {
      text-align: center;
      margin-bottom: 16px;
      font-size: 24px;
      font-weight: 700;
    }
    .video-card {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      background: linear-gradient(180deg, #1e1b2e 0%, #11101c 100%);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }
    video {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }
    .controls-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .control-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      min-width: 280px;
      flex: 1 1 320px;
    }
    .control-row-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .preview-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 840px) {
      .container {
        padding: 12px;
      }
      .title {
        font-size: 20px;
      }
      .controls-row {
        flex-direction: column;
        align-items: stretch;
      }
      .control-column {
        min-width: auto;
      }
      .preview-row {
        flex-direction: column;
      }
      .buttons {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
      .overlay {
        font-size: 14px;
      }
    }
    @media (max-width: 520px) {
      .video-card {
        border-radius: 24px;
      }
      .title {
        font-size: 18px;
      }
      .button-group, .control-row-inner {
        flex-direction: column;
        align-items: stretch;
      }
      .button-group button,
      .button-group label,
      .controls-row > .control-column {
        width: 100%;
      }
    }
    .overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 14px 18px;
      border-radius: 24px;
      box-sizing: border-box;
      backdrop-filter: blur(12px);
      background: rgba(18, 18, 18, 0.75);
      color: #fff;
      font-size: 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .desktop-status {
      display: block;
      margin: 16px auto 0;
      max-width: 1080px;
      padding: 12px 18px;
      border-radius: 20px;
      background: rgba(18, 18, 18, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      text-align: center;
      font-size: 15px;
    }
    .controls-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .control-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      min-width: 280px;
      flex: 1 1 320px;
    }
    .control-row-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .preview-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .button-start {
      background: #6d5cff;
      color: #fff;
      box-shadow: 0 12px 32px rgba(109, 92, 255, 0.3);
    }
    .button-pause {
      background: #2b2b2b;
      color: #fff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Camera Live Tracking - Audience Pose</div>
    <div class="video-card">
      <video id="input_video" playsinline autoplay muted></video>
      <canvas id="output_canvas"></canvas>
      <div id="status" class="overlay">Klik "Mulai Kamera" untuk mengaktifkan kamera.</div>
    </div>
    <div class="controls-row">
      <div class="control-column">
        <div class="control-row-inner">
          <label style="color:#ddd;font-size:14px;display:flex;gap:8px;align-items:center;">
            <input id="refUpload" type="file" accept="image/*" style="display:inline-block;" multiple />
            <span>Unggah Foto Referensi</span>
          </label>
        </div>
        <div class="control-row-inner">
          <button id="setRefBtn" class="button-start">Set Foto Referensi</button>
          <label style="color:#ddd;font-size:14px;display:flex;gap:6px;align-items:center;">Mirror
            <input id="mirrorToggle" type="checkbox" style="margin-left:6px;" />
          </label>
        </div>
        <div class="control-row-inner">
          <label style="color:#ddd;font-size:14px;">Threshold:</label>
          <input id="thresholdSlider" type="range" min="10" max="95" value="70" />
          <div id="thresholdLabel" style="color:#fff;font-weight:600;min-width:60px;text-align:center;">70%</div>
        </div>
      </div>
      <div class="control-column">
        <div class="preview-row">
          <canvas id="refCanvas" width="240" height="180" style="background:#111;border-radius:8px;border:1px solid rgba(255,255,255,0.04);"></canvas>
          <div id="accuracyResult" style="color:#fff;font-weight:600;min-width:160px;">Belum ada foto referensi.</div>
        </div>
        <div id="thumbnailsContainer" style="display:flex;gap:8px;overflow-x:auto;padding:6px;max-width:520px;"></div>
        <div class="button-group">
          <button id="saveRefBtn" class="button-start">Simpan Referensi</button>
          <button id="clearSavedBtn" class="button-pause">Hapus Semua Simpanan</button>
          <button id="exportRefsBtn" class="button-start">Export Preset</button>
          <label class="button-pause" style="padding:10px 14px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;">
            Import Preset
            <input id="importRefsInput" type="file" accept="application/json" style="display:none;margin-left:8px;" />
          </label>
          <button id="forceNoMirrorBtn" class="button-start" style="background:#ff6b6b;">Force No-Mirror</button>
        </div>
        <div id="savedContainer" style="display:flex;gap:8px;overflow-x:auto;padding:6px;max-width:520px;margin-top:8px;color:#ccc;"></div>
      </div>
    </div>
    <div class="buttons">
      <button id="startBtn" class="button-start">Mulai Kamera</button>
      <button id="stopBtn" class="button-pause">Berhenti</button>
    </div>
    <div class="footer">Audience dideteksi, titik dan garis saraf mengikuti gerakan tubuh.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="camera_tracking.js"></script>
</body>
</html>
