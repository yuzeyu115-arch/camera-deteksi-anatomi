<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Pose Tracking</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      color: #fff;
      font-family: 'Poppins', Arial, sans-serif;
    }
    .container {
      width: min(100%, 1080px);
      padding: 16px;
      box-sizing: border-box;
    }
    .title {
      text-align: center;
      margin-bottom: 16px;
      font-size: 24px;
      font-weight: 700;
    }
    .video-card {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      background: linear-gradient(180deg, #1e1b2e 0%, #11101c 100%);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
    }
    video {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 14px 18px;
      border-radius: 24px;
      box-sizing: border-box;
      backdrop-filter: blur(12px);
      background: rgba(18, 18, 18, 0.75);
      color: #fff;
      font-size: 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .button-start {
      background: #6d5cff;
      color: #fff;
      box-shadow: 0 12px 32px rgba(109, 92, 255, 0.3);
    }
    .button-pause {
      background: #2b2b2b;
      color: #fff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Camera Live Tracking - Audience Pose</div>
    <div class="video-card">
      <video id="input_video" playsinline autoplay muted></video>
      <canvas id="output_canvas"></canvas>
      <div id="status" class="overlay">Klik "Mulai Kamera" untuk mengaktifkan kamera.</div>
    </div>
    <div class="buttons">
      <button id="startBtn" class="button-start">Mulai Kamera</button>
      <button id="stopBtn" class="button-pause">Berhenti</button>
    </div>
    <div class="footer">Audience dideteksi, titik dan garis saraf mengikuti gerakan tubuh.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="camera_tracking.js"></script>
</body>
</html>
